name: Code Styling

on: [push, pull_request]

jobs:
    code-styling:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.head_ref }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - run: bun install

            - name: Bun Tests
              run: bun test build/mjml.test.mjs

            - name: Prettier
              run: bunx prettier --check "{!(vendor|node_modules)/**/*,*}.{js,ts,jsx,tsx,vue,xml,json,blade.php,css,md,yml,html}"

            - name: Pint
              uses: aglipanci/laravel-pint-action@2.6
